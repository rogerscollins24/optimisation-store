services:
  postgres:
    image: postgres:16-alpine
    container_name: admin-panel-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: adminpanel
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d adminpanel"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: admin-panel-api
    environment:
      DATABASE_URL: postgresql+psycopg://admin:admin@postgres:5432/adminpanel
      APP_PORT: 9000
      CORS_ORIGINS: http://localhost:4173,http://127.0.0.1:4173
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
